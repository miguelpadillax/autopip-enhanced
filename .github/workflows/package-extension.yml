name: Build Extension ZIP Artifact

on:
  push:
    branches:
      - main
    paths:
      - manifest.json

permissions:
  contents: write

jobs:
  package-extension:
    runs-on: ubuntu-latest

    env:
      EXTENSION_NAME: autopip-enhanced
      EXCLUDE_PATTERNS: |
        README.md
        LICENSE
        .git/
        .github/
        .DS_Store

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read extension version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare extension artifact
        id: package
        run: |
          ARTIFACT_NAME="${EXTENSION_NAME}-v${{ steps.version.outputs.version }}"
          STAGING_DIR=$(mktemp -d)
          INNER_DIR="$STAGING_DIR/$ARTIFACT_NAME"
          mkdir -p "$INNER_DIR"

          RSYNC_EXCLUDE_ARGS=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            RSYNC_EXCLUDE_ARGS+=("--exclude" "$pattern")
          done <<< "$EXCLUDE_PATTERNS"

          rsync -a --delete "${RSYNC_EXCLUDE_ARGS[@]}" ./ "$INNER_DIR/"

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$INNER_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
